spring:
  application:
    name: product-catalog-service

  docker:
    compose:
      file: ../../compose.yaml
      lifecycle-management: start-only
      profiles:
        active: product

  datasource:
    url: jdbc:postgresql://localhost:5434/productdb
    username: shop
    password: shop

  flyway:
    enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: 'create-drop'
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          delimiter: ;


  kafka:
    bootstrap-servers: localhost:9092
