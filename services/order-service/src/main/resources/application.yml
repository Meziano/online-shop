spring:
  application:
    name: order-service

  docker:
    compose:
      file: ../../compose.yaml
      lifecycle-management: start-only

  datasource:
    url: jdbc:postgresql://localhost:5436/orderdb
    username: shop
    password: shop

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ordering
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
